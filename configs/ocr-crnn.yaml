data:
  manifest: data/processed/ocr_manifest.jsonl
  dataset_root: data/raw/kaggle/ocr/v1/lp_ocr_dataset_vi
  output_dir: data/processed/ocr_training_wide
  compact_aspect_ratio: 1.5
  split_search_start: 0.35
  split_search_end: 0.65
  include_compact: false

model:
  image_height: 32
  image_width: 160
  hidden_size: 256
  lstm_layers: 2
  dropout: 0.0
  blank_bias: -2.0

augmentation:
  rotation_degrees: 0.0
  brightness: 0.0
  contrast: 0.0
  blur_probability: 0.0

train:
  epochs: 80
  min_epochs: 30
  batch_size: 64
  workers: 4
  device: cuda:0
  seed: 42
  deterministic: true
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 5.0
  patience: 15
  save_period: 5

output:
  project: artifacts/ocr
  name: crnn-ctc-wide-baseline
