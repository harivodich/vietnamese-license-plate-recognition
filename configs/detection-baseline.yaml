model: yolo11n.pt
data: data/processed/detection_yolo/dataset.yaml
project: artifacts/detection
name: yolo11n-baseline

train:
  epochs: 50
  patience: 15
  imgsz: 640
  batch: 8
  workers: 4
  device: 0
  seed: 42
  deterministic: true
  amp: true
  cache: false
  val: true
  save: true
  save_period: 5
  plots: true
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0005
  warmup_epochs: 3.0
  cos_lr: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 3.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0005
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  close_mosaic: 10
