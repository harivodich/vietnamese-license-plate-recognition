datasets:
  detection:
    handle: miahuynh04/vietnamese-license-plate-detection
    version: 1
    country: VN
    task: detection
    expected_license: MIT
    raw_dir: data/raw/kaggle/detection/v1
    manifest_path: data/interim/detection_manifest.jsonl

  ocr:
    handle: wirqhuy/vietnamese-license-plate-ocr
    version: 1
    country: VN
    task: ocr
    expected_license: MIT
    raw_dir: data/raw/kaggle/ocr/v1
    manifest_path: data/interim/ocr_manifest.jsonl
    corrections_path: configs/ocr-corrections.jsonl

validation:
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".webp"]
  near_duplicate_hamming_distance: 6
  manual_review_sample_size: 100
  report_path: data/interim/dataset_audit.json
  review_dir: data/interim/manual_review
  detection_eda_dir: reports/figures/detection
  ocr_eda_dir: reports/figures/ocr

split:
  train: 0.75
  validation: 0.125
  test: 0.125
  seed: 42
  output_dir: data/processed
  detection_yolo_dir: data/processed/detection_yolo
